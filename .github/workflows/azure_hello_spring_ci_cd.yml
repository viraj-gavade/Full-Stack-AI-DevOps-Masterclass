name: Hello Spring Boot App to AKS on Azure

on:
  workflow_dispatch:
  # push:
  #   # branches:
  #   #     - main
  #   paths:
  #       - "docker/app1-hello/springboot/hello-spring"

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Setup JDK
            uses: actions/setup-java@v5
            with:
                distribution: 'temurin' # See 'Supported distributions' for available options
                java-version: '21'

          - name: Build and Test (Maven)
            working-directory: docker/app1-hello/springboot/hello-spring
            run: mvn -B clean verify

          - name: Upload Test Reports
            uses: actions/upload-artifact@v4
            with:
                name: test-reports
                path: docker/app1-hello/springboot/hello-spring/target/surefire-reports

    docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Setup JDK
            uses: actions/setup-java@v5
            with:
                distribution: 'temurin' # See 'Supported distributions' for available options
                java-version: '21'

          - name: Build JAR for Docker
            working-directory: docker/app1-hello/springboot/hello-spring
            run: mvn -B clean package -DskipTests

          - name: Login to DockerHub
            uses: docker/login-action@v3
            with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}   
            
          - name: Build and Push Docker Image
            uses: docker/build-push-action@v6
            with:
                context: docker/app1-hello/springboot/hello-spring
                push: true
                tags: |
                    ${{ secrets.DOCKER_USERNAME }}/hello-spring:latest   
                    ${{ secrets.DOCKER_USERNAME }}/hello-spring:${{ github.sha }}    
                    ${{ secrets.DOCKER_USERNAME }}/hello-spring:${{ github.ref_name }}            


    deploy-aks:
        runs-on: ubuntu-latest
        needs: docker-build-push

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4
        
          - name: Authenticate to Azure
            uses: azure/login@v2
            with:
              client-id: ${{ secrets.AZURE_CLIENT_ID }}
              tenant-id: ${{ secrets.AZURE_TENANT_ID }}
              subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
              
          - name: Setup kubectl
            uses: azure/setup-kubectl@v4

          - name: Set AKS Context
            uses: azure/k8s-set-context@v3
            with:
              cluster-name: ${{ secrets.AZURE_AKS_CLUSTER_NAME }}
              resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
      
          - name: Verify connection
            run: kubectl get nodes

          - name: Deploy to Azure AKS
            run: kubectl apply -f k8s/azure/app1-hello






