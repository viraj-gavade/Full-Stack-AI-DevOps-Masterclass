name: Demo CI Env Secrets

on:
  push
  # workflow_dispatch

env:
  GLOBAL_APP_ENV: global-dev

jobs:
    build:
        runs-on: ubuntu-latest

        env:
          JOB_APP_ENV: job-dev

        steps:
          - name: Say Hello
            run: echo "Hello from the second workflow!"

          - name: Install
            env:
              APP_ENV: dev
              DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
            run: echo "Environment $APP_ENV using $DB_PASSWORD, $GLOBAL_APP_ENV, $JOB_APP_ENV"

          - name: Create demo file
            run: |
              echo "Hello from CI Pipeline" > demo.txt
              echo "File created successfully"


          - name: Upload Demo
            uses: actions/upload-artifact@v4 
            with:
              name: build-artifacts-demo
              path: .

    test:
        runs-on: ubuntu-latest
        needs: build

        steps:
          - name: Test Job
            run: echo "TestJob"
              