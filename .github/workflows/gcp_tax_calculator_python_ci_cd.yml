name: Tax Calculator Python CI/CD to GCP GKE

on:
  # push
  workflow_dispatch


jobs:
    build-test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                service: [service-a, service-b]

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Setup Python
            uses: actions/setup-python@v6
            with:
              python-version: '3.13'

          - name: Installing Dependencies
            working-directory: docker/app2-tax-calculator/python/${{ matrix.service }}
            run: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt

          - name: Run Smoke Test
            working-directory: docker/app2-tax-calculator/python/${{ matrix.service }}
            run: python -m py_compile main.py

    docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test
        strategy:
            matrix:
                service: 
                    - { name: "service-a", docker_name: "tax-service-a", path: "docker/app2-tax-calculator/python/service-a"}
                    - { name: "service-b", docker_name: "tax-service-b", path: "docker/app2-tax-calculator/python/service-b"}

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Login to DockerHub
            uses: docker/login-action@v3
            with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}   
            
          - name: Build and Push Docker Image
            uses: docker/build-push-action@v6
            with:
                context: ${{ matrix.service.path }}
                push: true
                tags: |
                    ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.docker_name }}:python-latest   


    deploy-gcp-gke:
        runs-on: ubuntu-latest
        needs: docker-build-push

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Authenticate to Google Cloud
            uses: 'google-github-actions/auth@v3'
            with:
              credentials_json: ${{ secrets.GCP_SA_KEY }}

          - name: Setup gcloud CLI
            uses: 'google-github-actions/setup-gcloud@v3'

          - name: Install gke-cloud-auth-plugin
            run: |
              gcloud components install gke-gcloud-auth-plugin

          - name: Configure kubectl for GKE
            run: |
              gcloud container clusters get-credentials ${{ secrets.GCP_CLUSTER_NAME }} \
                --region ${{ secrets.GCP_REGION }}
      
          - name: Verify connection
            run: kubectl get nodes

          - name: Deploy to GKE (Google Kubernetes Engine)
            run: |
                kubectl apply -f k8s/gcp/app2-tax-calculator/service-a
                kubectl apply -f k8s/gcp/app2-tax-calculator/service-b
                kubectl apply -f k8s/gcp/app2-tax-calculator/frontend
                kubectl apply -f k8s/gcp/app2-tax-calculator/ingress.yaml

