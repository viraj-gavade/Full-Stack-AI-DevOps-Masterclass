name: Hello Spring Boot App to AWS EKS

on:
  workflow_dispatch:
  push:
    # branches:
    #     - main
    paths:
        - "docker/app1-hello/springboot/hello-spring"

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Setup JDK
            uses: actions/setup-java@v5
            with:
                distribution: 'temurin' # See 'Supported distributions' for available options
                java-version: '21'

          - name: Build and Test (Maven)
            working-directory: docker/app1-hello/springboot/hello-spring
            run: mvn -B clean verify

          - name: Upload Test Reports
            uses: actions/upload-artifact@v4
            with:
                name: test-reports
                path: docker/app1-hello/springboot/hello-spring/target/surefire-reports

    docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Setup JDK
            uses: actions/setup-java@v5
            with:
                distribution: 'temurin' # See 'Supported distributions' for available options
                java-version: '21'

          - name: Build JAR for Docker
            working-directory: docker/app1-hello/springboot/hello-spring
            run: mvn -B clean package -DskipTests

          - name: Login to DockerHub
            uses: docker/login-action@v3
            with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}   
            
          - name: Build and Push Docker Image
            uses: docker/build-push-action@v6
            with:
                context: docker/app1-hello/springboot/hello-spring
                push: true
                tags: |
                    ${{ secrets.DOCKER_USERNAME }}/hello-spring:latest   
                    ${{ secrets.DOCKER_USERNAME }}/hello-spring:${{ github.sha }}    
                    ${{ secrets.DOCKER_USERNAME }}/hello-spring:${{ github.ref_name }}            


    deploy-aws-eks:
        runs-on: ubuntu-latest
        needs: docker-build-push

        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Configure AWS Credentials
            uses: aws-actions/configure-aws-credentials@v5.1.1
            with:
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws-region: ap-south-1

          - name: Setup kubectl
            uses: azure/setup-kubectl@v4

          - name: Update kubeconfig for EKS
            run: |
              aws eks update-kubeconfig --name hello-cluster --region ap-south-1

          - name: Verify connection
            run: kubectl get nodes

          - name: Deploy to AWS (Kubernetes)
            run: kubectl apply -f k8s/aws/app1-hello



