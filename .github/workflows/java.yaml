name: Deply the Java Application
on : 
    push : 
        branches : ["main"]
jobs : 
    build-test-java-app :
        runs-on : ubuntu-latest
        steps:
            - name : Checkout the code.
              uses : actions/checkout@v3

            - name: Install the Java JDK
              uses: actions/setup-java@v5
              with:
                distribution: 'temurin' # See 'Supported distributions' for available options
                java-version: '21'

            - name : Build and Test (maven)
              working-directory: docker/app1-hello/springboot/hello-spring
              run : mvn clean verify -B

            - name : Upload the test results 
              uses: actions/upload-artifact@v7
              with :
                name: artifacts
                path: docker/app1-hello/springboot/hello-spring/target/surefire-reports

    deploy-java-app-to-docker :
        runs-on : ubuntu-latest
        needs: build-test-java-app
        steps:
            - name : Checkout the code.
              uses : actions/checkout@v3

            - name: Install the Java JDK
              uses: actions/setup-java@v5
              with:
                distribution: 'temurin' # See 'Supported distributions' for available options
                java-version: '21'

            - name : Build The Jar File 
              working-directory: docker/app1-hello/springboot/hello-spring
              run : mvn clean package -DskipTests


            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                context: docker/app1-hello/springboot/hello-spring
                push: true
                tags:   |
                 virajjs/hello-spring:latest            
                 
            
