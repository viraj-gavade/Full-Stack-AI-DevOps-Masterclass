apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
    spec:
      containers:
        - name: service-a
          image: embarkx/tax-service-a
          env : 
          - name : TAX_SERVICE_URL
            valueFrom :
              configMapKeyRef : 
                name : app-config
                key : TAX_SERVICE_URL
          ports:
            - containerPort: 3000
